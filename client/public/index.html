<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes" />
    <meta name="theme-color" content="#0f0f0f" />
    
    <!-- SEO Meta Tags -->
    <title>Watchverse - Streaming Aggregator Platform</title>
    <meta name="description" content="Watchverse: Your ultimate streaming aggregator. Search, discover, and manage your favorite movies and shows across multiple streaming platforms." />
    <meta name="keywords" content="streaming, movies, shows, aggregator, entertainment, watchlist" />
    <meta name="author" content="Watchverse" />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://watchverse.com" />
    <meta property="og:title" content="Watchverse - Streaming Aggregator Platform" />
    <meta property="og:description" content="Your ultimate streaming aggregator. Search, discover, and manage your favorite movies and shows." />
    <meta property="og:site_name" content="Watchverse" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Watchverse - Streaming Aggregator Platform" />
    <meta name="twitter:description" content="Your ultimate streaming aggregator. Search, discover, and manage your favorite movies and shows." />
    
    <!-- Favicons -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Preconnect to external domains for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Additional mobile meta tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Watchverse">
    <meta name="mobile-web-app-capable" content="yes">
    
    <!-- Preload critical resources -->
    <link rel="preload" href="%PUBLIC_URL%/static/css/main.css" as="style">
  </head>
  <body>
    <noscript>
      <div style="background: #0f0f0f; color: white; padding: 20px; text-align: center; font-family: Poppins, sans-serif;">
        <h1>Watchverse Requires JavaScript</h1>
        <p>You need to enable JavaScript to run this application.</p>
        <p>Please check your browser settings and try again.</p>
      </div>
    </noscript>
    
    <div id="root"></div>
    
    <!-- Register Service Worker for offline support and PWA capabilities -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('%PUBLIC_URL%/service-worker.js')
            .then(registration => {
              console.log('Service Worker registered successfully:', registration);
            })
            .catch(error => {
              console.log('Service Worker registration failed:', error);
            });
        });
      }
    </script>
  </body>
</html>
