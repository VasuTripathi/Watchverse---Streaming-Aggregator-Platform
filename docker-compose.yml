version: '3.8'

services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: watchverse-backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_KEY: ${SUPABASE_KEY}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: http://localhost:3000,http://host.docker.internal:3000
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    volumes:
      - ./server:/app
      - /app/node_modules
    restart: unless-stopped
    networks:
      - watchverse-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Optional: Local database (remove if using online Supabase)
  # postgres:
  #   image: postgres:15-alpine
  #   container_name: watchverse-db
  #   environment:
  #     POSTGRES_USER: watchverse
  #     POSTGRES_PASSWORD: ${DB_PASSWORD}
  #     POSTGRES_DB: watchverse
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   networks:
  #     - watchverse-network

  # Optional: Redis for caching
  # redis:
  #   image: redis:7-alpine
  #   container_name: watchverse-redis
  #   ports:
  #     - "6379:6379"
  #   networks:
  #     - watchverse-network

networks:
  watchverse-network:
    driver: bridge

# volumes:
#   postgres_data:

# Usage:
# 1. Copy .env.example to .env in both server and client directories
# 2. Fill in actual values for SUPABASE_URL, SUPABASE_KEY, JWT_SECRET, OPENAI_API_KEY
# 3. Run: docker-compose up -d
# 4. Visit http://localhost:5000 to check backend health
# 5. In another terminal, run: cd client && npm start
# 6. Visit http://localhost:3000 for frontend
# 7. View logs: docker-compose logs -f backend
# 8. Stop: docker-compose down
